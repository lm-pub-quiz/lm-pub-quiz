name: Tests

on:
  push:
    branches: [ "main" ]
    paths-ignore:
    - "docs/**"
    - "mkdocs.yml"
    - "README.md"
    - ".gitignore"
    - "LICENSE"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
    - "docs/**"
    - "mkdocs.yml"
    - "README.md"
    - ".gitignore"
    - "LICENSE"
jobs:
  run:
    name: "Run Tests"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      id: setup-python
      uses: actions/setup-python@v6
      with:
        # No cache needed, since packages are managed in the hatch virtual environment
        python-version: ${{ matrix.python-version }}

    - name: Install Hatch
      uses: pypa/hatch@install

    # Set up caching of hatch's virtual environment
    - name: Set up hatch environment cache
      if: runner.os == 'Linux'
      uses: "actions/cache@v5"
      with:
        path: .venv/
        key: "hatch-env-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}"
        restore-keys: "hatch-env-${{ steps.setup-python.outputs.python-version }}-"
    # Install hatch and set the venv-location
    - name: Install hatch
      run: uv tool install hatch; hatch config set dirs.env.virtual ".venv"
    - name: Lint
      run: hatch run lint:fmt
    - name: Type Checking
      run: hatch run lint:typing-github
    - name: Tests
      run: hatch run +py=${{ matrix.python-version }} test
